<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moods</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="mood-body">

<div class="mood-container">

<h1>CHOOSE YOUR CHAOS MOOD</h1>

<div class="moods-grid">

<div class="mood-card active" data-mood="Savage">
  <div class="emoji">😈</div>
  <h2>Savage</h2>
</div>

<div class="mood-card" data-mood="Indian Parents">
  <div class="emoji">🩴</div>
  <h2>Indian Parents</h2>
</div>

<div class="mood-card" data-mood="Sigma">
  <div class="emoji">🗿</div>
  <h2>Sigma</h2>
</div>

<div class="mood-card" data-mood="Pookie">
  <div class="emoji">🎀</div>
  <h2>Pookie</h2>
</div>

<div class="mood-card" data-mood="Chaotic">
  <div class="emoji">🤪</div>
  <h2>Chaotic</h2>
</div>

<div class="mood-card" data-mood="Iced">
  <div class="emoji">🥶</div>
  <h2>Iced</h2>
</div>

</div>

<button id="startCooking" class="confirm-btn">
CONFIRM MOOD
</button>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
