<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Choose Mood</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="setup-body">

<div class="setup-container">

  <h1>Select Your Chaos Mood</h1>

  <div class="moods">

    <div class="mood-card active" data-mood="Savage">
      😈 Savage
    </div>

    <div class="mood-card" data-mood="Indian Parents">
      👨‍👩‍👧 Indian Parents
    </div>

    <div class="mood-card" data-mood="Sigma">
      🗿 Sigma
    </div>

    <div class="mood-card" data-mood="Pookie">
      🎀 Pookie
    </div>

    <div class="mood-card" data-mood="Chaotic">
      ⚡ Chaotic
    </div>

    <div class="mood-card" data-mood="Iced">
      ❄️ Iced
    </div>

  </div>

  <div class="slider-box">

    <label>Roast Intensity</label>

    <input type="range" min="1" max="10" value="5">

  </div>

  <button id="startCooking">
    START COOKING 🔥
  </button>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
