<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CookedGPT</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#05010d;
color:white;
overflow-x:hidden;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 60px;
position:relative;
z-index:10;
}

.logo{
display:flex;
align-items:center;
gap:12px;
font-weight:bold;
font-size:22px;
}

.logo-box{
width:42px;
height:42px;
border-radius:14px;
background:#9333ea;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
box-shadow:0 0 25px #d946ef;
}

.nav-links{
display:flex;
gap:35px;
}

.nav-links a{
text-decoration:none;
color:#ddd;
}

.launch-btn{
text-decoration:none;
color:white;
padding:14px 30px;
border-radius:999px;
background:linear-gradient(90deg,#9333ea,#ec4899);
font-weight:bold;
box-shadow:0 0 20px #d946ef;
}

.hero{
display:grid;
grid-template-columns:1fr 1fr 1fr;
</html>
