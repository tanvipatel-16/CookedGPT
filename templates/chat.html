<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CookedGPT Chat</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#05010d;
color:white;
height:100vh;
overflow:hidden;
}

.chat-layout{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:280px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-right:1px solid rgba(255,255,255,0.08);
padding:25px;
overflow:auto;
transition:0.3s;
}

.sidebar h1{
margin-bottom:25px;
color:#f5d0fe;
}

#newChat{
width:100%;
padding:15px;
border:none;
border-radius:18px;
background:linear-gradient(90deg,#9333ea,#ec4899);
color:white;
font-size:16px;
cursor:pointer;
margin-bottom:30px;
}

.history-item{
padding:14px;
border-radius:15px;
background:rgba(255,255,255,0.05);
margin-bottom:12px;
cursor:pointer;
}

/* MAIN */

.chat-main{
flex:1;
display:flex;
flex-direction:column;
}

.topbar{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,0.08);
}

#menuBtn{
display:none;
background:none;
border:none;
color:white;
font-size:26px;
cursor:pointer;
}

.messages{
flex:1;
overflow:auto;
padding:30px;
}

.welcome-chat{
text-align:center;
margin-top:100px;
}

.welcome-chat h1{
font-size:70px;
color:#f5d0fe;
text-shadow:0 0 25px #d946ef;
margin-bottom:15px;
}

.msg{
display:flex;
margin-bottom:25px;
}

.user-msg{
justify-content:flex-end;
}

.bubble{
max-width:75%;
padding:18px 22px;
border-radius:24px;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.08);
line-height:1.7;
}

.user-msg .bubble{
background:linear-gradient(90deg,#9333ea,#ec4899);
}

.chat-input{
display:flex;
padding:20px;
gap:15px;
border-top:1px solid rgba(255,255,255,0.08);
}

.chat-input input{
flex:1;
padding:18px;
border:none;
outline:none;
border-radius:20px;
background:rgba(255,255,255,0.06);
color:white;
font-size:16px;
}

#sendBtn{
width:60px;
border:none;
border-radius:18px;
background:linear-gradient(90deg,#9333ea,#ec4899);
color:white;
font-size:20px;
cursor:pointer;
}

.regen-btn{
margin-top:15px;
background:none;
border:none;
color:#d946ef;
cursor:pointer;
}

@media(max-width:850px){

.sidebar{
position:fixed;
left:-100%;
top:0;
height:100%;
z-index:1000;
}

.sidebar.show{
left:0;
}

#menuBtn{
display:block;
}

.messages{
padding:15px;
}

.bubble{
max-width:90%;
}

}

</style>

</head>

<body>

<div class="chat-layout">

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<h1>CookedGPT</h1>

<button id="newChat">
+ New Chat
</button>

<div id="chatHistory"></div>

</div>

<!-- MAIN -->

<div class="chat-main">

<div class="topbar">

<button id="menuBtn">
☰
</button>

<div>
Mood:
<span id="moodText"></span>
</div>

</div>

<div class="messages" id="messages">

<div class="welcome-chat">

<h1>CookedGPT</h1>

<p>
emotionally unstable AI assistant
</p>

</div>

</div>

<div class="chat-input">

<input
type="text"
id="messageInput"
placeholder="Type your message..."
>

<button id="sendBtn">
➤
</button>

</div>

</div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
