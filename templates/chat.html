<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CookedGPT</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">

    <div class="logo">
      CookedGPT
    </div>

    <button class="new-chat">
      + New Chat
    </button>

    <div class="history">
      <div class="chat-item">Marketing Ideas</div>
      <div class="chat-item">Trip Story</div>
      <div class="chat-item">Funny Roast</div>
      <div class="chat-item">Business Help</div>
    </div>

  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Mobile Top -->
    <div class="mobile-top">

      <button id="menuBtn">
        ☰
      </button>

      <h2>CookedGPT</h2>

    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea">

      <div class="ai-message">
        <div class="avatar">AI</div>

        <div class="bubble">
          Hey 👋 I'm CookedGPT. Ask me anything.
        </div>
      </div>

    </div>

    <!-- Input -->
    <div class="chat-input">

      <input
        type="text"
        id="messageInput"
        placeholder="Message CookedGPT..."
      />

      <button id="sendBtn">
        Send
      </button>

    </div>

  </main>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
