<!DOCTYPE html>
<html>
<head>
    <title>CookedGPT Chat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="chat-container">

    <div class="moods">
        <button onclick="setMood('savage mode')">Savage</button>
        <button onclick="setMood('delulu')">Delulu</button>
        <button onclick="setMood('sigma')">Sigma</button>
        <button onclick="setMood('clowncheck')">Clown</button>
        <button onclick="setMood('indian parents')">Parents</button>
    </div>

    <input type="range" min="1" max="10" value="5" id="intensity">

    <div id="chatBox"></div>

    <div class="input-area">
        <input id="userInput" placeholder="Type...">
        <button onclick="send()">➤</button>
    </div>

    <button onclick="newChat()">New Chat</button>

</div>

<script src="/static/script.js"></script>

</body>
</html>
